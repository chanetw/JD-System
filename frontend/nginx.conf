server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $backend_upstream http://backend:3000;

    # Root สำหรับ React build
    root /usr/share/nginx/html;
    index index.html;

    # จำกัดขนาด upload (ต้องไม่น้อยกว่า backend body limit 10MB)
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Custom error pages — ส่ง SPA fallback แทน nginx 502 page
    error_page 502 503 504 /50x-fallback.html;
    location = /50x-fallback.html {
        root /usr/share/nginx/html;
        internal;
        try_files /index.html =502;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Always revalidate SPA shell so new asset hashes are picked up after deploy
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Proxy API requests ไป Backend
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # กรณี backend ยังไม่พร้อม ส่ง JSON error แทน nginx 502 HTML
        proxy_intercept_errors on;
        error_page 502 = @backend_down;
    }

    location @backend_down {
        default_type application/json;
        return 503 '{"success":false,"error":"SERVICE_UNAVAILABLE","message":"Backend is starting up. Please try again in a moment."}';
    }

    # Proxy Socket.io ไป Backend (WebSocket ต้องการ timeout สูง)
    location /socket.io/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Serve ไฟล์ที่ upload ผ่าน Docker Volume
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # React SPA — ทุก route กลับมาที่ index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
