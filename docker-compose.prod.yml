# DJ System - Docker Compose (Production)
# ใช้สำหรับ production server
# รวม PostgreSQL + Backend + Nginx

version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15
    container_name: dj-postgres-prod
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dj_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - dj-data-prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dj-network

  # ==========================================
  # Backend API + Socket.io
  # ==========================================
  backend:
    build: ./backend/api-server
    container_name: dj-backend-prod
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/api-server/.env.production
    environment:
      DATABASE_MODE: local
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dj_system}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      AUTH_MODE: jwt_only
      NODE_ENV: production
    volumes:
      - dj-files-prod:/app/uploads
    restart: always
    networks:
      - dj-network

  # ==========================================
  # Nginx Reverse Proxy (Optional)
  # ==========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: dj-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - backend
  #   restart: always
  #   networks:
  #     - dj-network

volumes:
  dj-data-prod:
    driver: local
  dj-files-prod:
    driver: local

networks:
  dj-network:
    driver: bridge
