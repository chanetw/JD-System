# DJ System - Docker Compose (Production)
# ใช้สำหรับ production server
# รวม PostgreSQL + Backend + Nginx

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15
    platform: linux/arm64
    container_name: dj-postgres-prod
    env_file:
      - ./backend/api-server/.env.production
    volumes:
      - dj-data-prod:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dj-network

  # ==========================================
  # Backend API + Socket.io
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: api-server/Dockerfile
    platform: linux/arm64
    container_name: dj-backend-prod
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/api-server/.env.production
    environment:
      DATABASE_MODE: local
      STORAGE_PROVIDER: local
      AUTH_MODE: jwt_only
      NODE_ENV: production
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-arm64-openssl-3.0.x.so.node
    volumes:
      - dj-files-prod:/app/uploads
    restart: always
    networks:
      - dj-network

  # ==========================================
  # Frontend (React + Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
        VITE_FRONTEND_MODE: api_only
        VITE_AUTH_MODE: jwt_only
    platform: linux/arm64
    container_name: dj-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - dj-files-prod:/app/uploads:ro
    restart: always
    networks:
      - dj-network

volumes:
  dj-data-prod:
    driver: local
  dj-files-prod:
    driver: local

networks:
  dj-network:
    driver: bridge
