# DJ System - Docker Compose (Production)
# ใช้สำหรับ production server (รองรับทั้ง ARM64 และ AMD64)
# รวม PostgreSQL + Backend + Nginx
#
# วิธีใช้:
#   Build เอง:   docker compose -f docker-compose.prod.yml up -d --build
#   Pull จาก Hub: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15
    container_name: dj-postgres-prod
    env_file:
      - ./backend/api-server/.env.production
    volumes:
      - dj-data-prod:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    restart: always
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dj_system"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dj-network

  # ==========================================
  # Backend API + Socket.io
  # ==========================================
  backend:
    image: chanetw/dj-system-backend:latest
    build:
      context: ./backend
      dockerfile: api-server/Dockerfile
    container_name: dj-backend-prod
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/api-server/.env.production
    environment:
      DATABASE_MODE: local
      STORAGE_PROVIDER: local
      AUTH_MODE: jwt_only
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://dj.sena.co.th}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://dj.sena.co.th,http://localhost,http://localhost:80}
    volumes:
      - ./uploads:/app/uploads
    restart: always
    mem_limit: 1g
    cpus: 1.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dj-network

  # ==========================================
  # Frontend (React + Nginx)
  # ==========================================
  frontend:
    image: chanetw/dj-system-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_FRONTEND_MODE: api_only
        VITE_AUTH_MODE: jwt_only
    container_name: dj-frontend-prod
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads:ro
    restart: always
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - dj-network

volumes:
  dj-data-prod:
    driver: local

networks:
  dj-network:
    driver: bridge
