# DJ System - Docker Compose (Development)
# ใช้สำหรับ development environment
# สลับระหว่าง Supabase และ Local ได้ด้วย environment variables

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15
    container_name: dj-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dj_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - dj-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Backend API (Development, optional)
  # Run with: docker compose --profile app up -d
  # ==========================================
  backend:
    image: node:20-bookworm
    container_name: dj-backend-dev
    profiles: ["app"]
    working_dir: /workspace/api-server
    command: sh -c "npm ci && npx prisma generate --schema ../prisma/schema.prisma && npm run dev"
    env_file:
      - ./backend/api-server/.env.example
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dj_system}
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/workspace
      - dj-backend-node-modules:/workspace/api-server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================
  # Frontend Vite (Development, optional)
  # Run with: docker compose --profile app up -d
  # ==========================================
  frontend:
    image: node:22-alpine
    container_name: dj-frontend-dev
    profiles: ["app"]
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_FRONTEND_MODE: api_only
      VITE_AUTH_MODE: jwt_only
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - dj-frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  dj-data:
    driver: local
  dj-backend-node-modules:
    driver: local
  dj-frontend-node-modules:
    driver: local
