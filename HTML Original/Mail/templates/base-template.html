<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{TITLE}}</title>
    <style>
        /* Reset Styles */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
        
        /* DJ System Brand Colors */
        :root {
            --primary-color: #e11d48;
            --secondary-color: #4f46e5;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --border-color: #e5e7eb;
        }
        
        /* Base Styles */
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            line-height: 1.6;
        }
        
        /* Container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        /* Header */
        .email-header {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            padding: 30px 20px;
            text-align: center;
        }
        
        .email-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
        }
        
        /* Content */
        .email-content {
            padding: 40px 30px;
        }
        
        .greeting {
            font-size: 18px;
            color: #1f2937;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 25px;
            line-height: 1.8;
        }
        
        /* Job Card */
        .job-card {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin: 25px 0;
        }
        
        .job-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }
        
        .job-id {
            font-size: 18px;
            font-weight: 700;
            color: #e11d48;
        }
        
        .job-priority {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .priority-urgent {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .priority-high {
            background-color: #fed7aa;
            color: #9a3412;
        }
        
        .priority-normal {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .job-detail {
            margin: 10px 0;
            font-size: 14px;
            color: #4b5563;
        }
        
        .job-detail strong {
            color: #1f2937;
            font-weight: 600;
        }
        
        /* Button */
        .button {
            display: inline-block;
            padding: 14px 32px;
            background-color: #e11d48;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            margin: 20px 0;
            transition: background-color 0.3s ease;
        }
        
        .button:hover {
            background-color: #be123c;
        }
        
        .button-secondary {
            background-color: #4f46e5;
        }
        
        .button-secondary:hover {
            background-color: #4338ca;
        }
        
        .button-success {
            background-color: #10b981;
        }
        
        .button-success:hover {
            background-color: #059669;
        }
        
        .button-danger {
            background-color: #ef4444;
        }
        
        .button-danger:hover {
            background-color: #dc2626;
        }
        
        /* Info Box */
        .info-box {
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .warning-box {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .success-box {
            background-color: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .danger-box {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        /* Footer */
        .email-footer {
            background-color: #f9fafb;
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        
        .email-footer p {
            margin: 5px 0;
            font-size: 14px;
            color: #6b7280;
        }
        
        .email-footer a {
            color: #e11d48;
            text-decoration: none;
        }
        
        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-content {
                padding: 30px 20px !important;
            }
            
            .button {
                display: block;
                width: 100%;
            }
            
            .job-card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .job-priority {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f3f4f6;">
        <tr>
            <td style="padding: 20px 0;">
                <table class="email-container" role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center">
                    
                    <!-- Header -->
                    <tr>
                        <td class="email-header">
                            <!-- Logo placeholder - จะใส่ logo จริงภายหลัง -->
                            <div style="background-color: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; display: inline-block; margin-bottom: 15px;">
                                <span style="color: #ffffff; font-size: 24px; font-weight: 700;">DJ SYSTEM</span>
                            </div>
                            <h1>{{HEADER_TITLE}}</h1>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td class="email-content">
                            {{CONTENT}}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td class="email-footer">
                            <p style="font-weight: 600; color: #1f2937; margin-bottom: 10px;">DJ System - Design Job Management</p>
                            <p>ระบบจัดการงานออกแบบ</p>
                            <p style="margin-top: 15px;">
                                หากมีข้อสงสัย กรุณาติดต่อ Admin ของคุณ
                            </p>
                            <p style="font-size: 12px; color: #9ca3af; margin-top: 20px;">
                                อีเมลนี้ส่งโดยอัตโนมัติ กรุณาอย่าตอบกลับ
                            </p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
